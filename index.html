class="itemPreview"

type="number"
placeholder="0">

<label>Skill</label>

<select id="weaponSkill"></select>



<div class="doubleInput">


<div>

<option value="1">None</option>

<option value="1.2">Rev 1</option>

<option value="1.4">Rev 2</option>

<option value="1.4">Rev 3</option>

</select>

</div>



<div>

<label>Crit</label>

<option value="1">None</option>

<option value="1.7">Critical</option>

</select>

</div>


</div>




<h3>Target</h3>


<div class="doubleInput">


<div>

<select id="weaponResistance">

<!-- =========================
        SERVICE WORKER
========================= -->


<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", async ()=>{

try{

const registration =
await navigator.serviceWorker.register(
"./service-worker.js"
);


registration.addEventListener(
"updatefound",
()=>{

const worker =
registration.installing;


worker.addEventListener(
"statechange",
()=>{


if(
worker.state==="installed"
&&
navigator.serviceWorker.controller
){

window.location.reload();

}


});


});


}

catch(err){

console.error(
"Service Worker Fehler:",
err
);

}


});

}

</script>
