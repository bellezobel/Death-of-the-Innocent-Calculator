<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Death of the Innocent</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">

<h1>Damage Calculator</h1>

<label>Base Damage</label>
<input id="damage" type="number" value="70">

<label>Modifier</label>

<select id="modifier">
    <option value="1">None</option>
    <option value="1.3">Rev 1</option>
    <option value="1.4">Rev 2</option>
    <option value="1.7">Critical</option>
</select>

<label>Resistance</label>

<select id="resistance">

<option value="0">0%</option>
<option value="10">10%</option>
<option value="15">15%</option>
<option value="20">20%</option>

</select>

<button onclick="calculateDamage()">
Calculate
</button>

<h2 id="result">
Final Damage:
</h2>

</div>

<script src="script.js"></script>

</body>

</html>
